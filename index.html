<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き時間チェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    /* Settings grid */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .setting-item label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .setting-item input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .setting-item input:focus { border-color: #4285f4; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-google {
      background: #4285f4;
      color: #fff;
      width: 100%;
      justify-content: center;
    }
    .btn-google:hover:not(:disabled) { background: #3367d6; }

    .btn-run {
      background: #111;
      color: #fff;
      width: 100%;
      justify-content: center;
    }
    .btn-run:hover:not(:disabled) { background: #333; }

    .btn-copy {
      background: #f0f0f0;
      color: #333;
      font-size: 13px;
      padding: 8px 14px;
    }
    .btn-copy:hover { background: #e0e0e0; }

    /* Status */
    .status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 10px;
    }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #fce8e6; color: #c62828; }
    .status.info { background: #e3f2fd; color: #1565c0; }

    /* Calendar checkboxes */
    .cal-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cal-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .cal-item:hover { background: #f5f5f5; }
    .cal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Results */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .day-block { margin-bottom: 16px; }
    .day-label {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }
    .slot {
      display: inline-block;
      background: #f0f7ff;
      color: #1a56c4;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 14px;
      margin: 3px 4px 3px 0;
    }

    .empty-msg {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 20px 0;
    }

    .loader {
      text-align: center;
      color: #888;
      font-size: 14px;
      padding: 20px 0;
    }

    .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    a { color: #4285f4; }
  </style>
</head>
<body>
<div class="container">
  <h1>📅 空き時間チェッカー</h1>

  <!-- サインイン -->
  <div class="card">
    <button class="btn btn-google" id="signInBtn" onclick="signIn()">
      Googleでサインイン
    </button>
    <div id="authStatus"></div>
  </div>

  <!-- カレンダー選択 -->
  <div class="card" id="calCard" style="display:none">
    <div class="card-title">カレンダーを選択</div>
    <div class="cal-list" id="calList">
      <div class="loader">読み込み中...</div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">設定</div>
    <div class="settings-grid">
      <div class="setting-item">
        <label>対象日数</label>
        <input type="number" id="days" value="10" min="1" max="30" />
      </div>
      <div class="setting-item">
        <label>最小空き時間（分）</label>
        <input type="number" id="minDuration" value="60" min="15" max="480" />
      </div>
      <div class="setting-item">
        <label>開始時刻</label>
        <input type="time" id="startTime" value="10:00" />
      </div>
      <div class="setting-item">
        <label>終了時刻</label>
        <input type="time" id="endTime" value="22:00" />
      </div>
    </div>
    <hr class="divider">
    <button class="btn btn-run" id="runBtn" onclick="run()" disabled>
      空き時間を取得
    </button>
  </div>

  <!-- 結果 -->
  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <div class="card-title" style="margin-bottom:0">結果</div>
      <button class="btn btn-copy" onclick="copyResults()">コピー</button>
    </div>
    <div id="resultsBody"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
  // Google CloudのClient ID
  const CLIENT_ID = '1022368136744-f6q6gcfj9af4i4m6gvk4ddo6t1v5kkk2.apps.googleusercontent.com';

  let tokenClient = null;
  let accessToken = null;

  function signIn() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/calendar.readonly',
      callback: onTokenReceived,
      error_callback: (err) => {
        showStatus('authStatus', 'サインインに失敗しました: ' + (err.message || err.type), 'error');
      }
    });
    tokenClient.requestAccessToken();
  }

  async function onTokenReceived(resp) {
    if (resp.error) {
      showStatus('authStatus', 'エラー: ' + resp.error, 'error');
      return;
    }
    accessToken = resp.access_token;
    showStatus('authStatus', 'サインイン済み ✓', 'ok');
    document.getElementById('signInBtn').textContent = '再サインイン';

    // カレンダー一覧を取得して表示
    await loadCalendars();
  }

  async function loadCalendars() {
    const calCard = document.getElementById('calCard');
    const calList = document.getElementById('calList');
    calCard.style.display = 'block';
    calList.innerHTML = '<div class="loader">読み込み中...</div>';

    try {
      const resp = await fetch(
        'https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=250',
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const data = await resp.json();
      const calendars = data.items || [];

      // チェックボックス一覧を生成（デフォルトは全選択）
      calList.innerHTML = calendars.map(cal => `
        <label class="cal-item">
          <input type="checkbox" value="${escapeHtml(cal.id)}" checked />
          <span class="cal-dot" style="background:${cal.backgroundColor || '#4285f4'}"></span>
          <span>${escapeHtml(cal.summary)}</span>
        </label>
      `).join('');

      document.getElementById('runBtn').disabled = false;
    } catch (err) {
      calList.innerHTML = `<div class="status error">カレンダーの取得に失敗しました: ${err.message}</div>`;
    }
  }

  async function run() {
    if (!accessToken) {
      showStatus('authStatus', 'まずサインインしてください', 'error');
      return;
    }

    // 選択されたカレンダーIDを取得
    const selectedIds = [...document.querySelectorAll('#calList input[type="checkbox"]:checked')]
      .map(cb => cb.value);

    if (selectedIds.length === 0) {
      alert('カレンダーを1つ以上選択してください');
      return;
    }

    const days = parseInt(document.getElementById('days').value) || 10;
    const minDuration = parseInt(document.getElementById('minDuration').value) || 60;
    const startTime = document.getElementById('startTime').value || '10:00';
    const endTime = document.getElementById('endTime').value || '22:00';
    const [startH, startM] = startTime.split(':').map(Number);
    const [endH, endM] = endTime.split(':').map(Number);

    const resultsCard = document.getElementById('resultsCard');
    const resultsBody = document.getElementById('resultsBody');
    resultsCard.style.display = 'block';
    resultsBody.innerHTML = '<div class="loader">取得中...</div>';

    try {
      const now = new Date();
      const rangeStart = new Date(now);
      rangeStart.setHours(0, 0, 0, 0);
      const rangeEnd = new Date(rangeStart);
      rangeEnd.setDate(rangeEnd.getDate() + days);

      // 選択された全カレンダーからイベントを取得してマージ
      const allEvents = (await Promise.all(
        selectedIds.map(id => fetchEvents(id, rangeStart, rangeEnd))
      )).flat();

      // 終日イベントを除外
      const timedEvents = allEvents.filter(e => e.start && e.start.dateTime);

      const resultDays = [];

      for (let d = 0; d < days; d++) {
        const date = new Date(rangeStart);
        date.setDate(date.getDate() + d);

        const dayStart = new Date(date);
        dayStart.setHours(startH, startM, 0, 0);
        const dayEnd = new Date(date);
        dayEnd.setHours(endH, endM, 0, 0);

        const overlapping = timedEvents.filter(e => {
          const s = new Date(e.start.dateTime);
          const en = new Date(e.end.dateTime);
          return s < dayEnd && en > dayStart;
        });

        overlapping.sort((a, b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));

        const slots = calcFreeSlots(overlapping, dayStart, dayEnd, minDuration);
        if (slots.length > 0) {
          resultDays.push({ date, slots });
        }
      }

      renderResults(resultDays);
    } catch (err) {
      resultsBody.innerHTML = `<div class="status error">エラー: ${err.message}</div>`;
    }
  }

  async function fetchEvents(calendarId, timeMin, timeMax) {
    const params = new URLSearchParams({
      timeMin: timeMin.toISOString(),
      timeMax: timeMax.toISOString(),
      singleEvents: 'true',
      orderBy: 'startTime',
      maxResults: '2500',
    });

    const resp = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?${params}`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );

    if (resp.status === 401) {
      accessToken = null;
      document.getElementById('runBtn').disabled = true;
      showStatus('authStatus', 'セッション切れ。再サインインしてください', 'error');
      throw new Error('認証切れ');
    }

    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error?.message || 'API エラー');
    }

    const data = await resp.json();
    return data.items || [];
  }

  function calcFreeSlots(events, dayStart, dayEnd, minDuration) {
    const slots = [];
    let cursor = new Date(dayStart);

    for (const ev of events) {
      const evStart = new Date(ev.start.dateTime);
      const evEnd = new Date(ev.end.dateTime);

      const clippedStart = new Date(Math.max(evStart.getTime(), dayStart.getTime()));
      const clippedEnd = new Date(Math.min(evEnd.getTime(), dayEnd.getTime()));

      if (clippedStart > cursor) {
        const mins = (clippedStart - cursor) / 60000;
        if (mins >= minDuration) {
          slots.push({ start: new Date(cursor), end: new Date(clippedStart) });
        }
      }

      if (clippedEnd > cursor) cursor = clippedEnd;
    }

    if (dayEnd > cursor) {
      const mins = (dayEnd - cursor) / 60000;
      if (mins >= minDuration) {
        slots.push({ start: new Date(cursor), end: new Date(dayEnd) });
      }
    }

    return slots;
  }

  const DAYS_JA = ['日', '月', '火', '水', '木', '金', '土'];

  function renderResults(resultDays) {
    const body = document.getElementById('resultsBody');
    if (resultDays.length === 0) {
      body.innerHTML = '<div class="empty-msg">条件に合う空き時間が見つかりませんでした</div>';
      return;
    }

    let html = '';
    for (const { date, slots } of resultDays) {
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const dow = DAYS_JA[date.getDay()];
      html += `<div class="day-block">`;
      html += `<div class="day-label">${m}月${d}日（${dow}）</div>`;
      for (const slot of slots) {
        const s = fmt(slot.start);
        const e = fmt(slot.end);
        html += `<span class="slot">${s}〜${e}</span>`;
      }
      html += '</div>';
    }
    body.innerHTML = html;
  }

  function fmt(dt) {
    const h = String(dt.getHours()).padStart(2, '0');
    const m = String(dt.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
  }

  function copyResults() {
    const resultDays = [];
    document.querySelectorAll('.day-block').forEach(block => {
      const label = block.querySelector('.day-label').textContent;
      const slots = [...block.querySelectorAll('.slot')].map(s => s.textContent);
      resultDays.push(`${label}\n` + slots.map(s => `　${s}`).join('\n'));
    });

    if (resultDays.length === 0) return;

    const text = resultDays.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'コピーしました！';
      setTimeout(() => btn.textContent = 'コピー', 2000);
    });
  }

  function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.innerHTML = `<div class="status ${type}">${msg}</div>`;
  }

  // XSS対策
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
